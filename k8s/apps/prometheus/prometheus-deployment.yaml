apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: brioit-local
    app.kubernetes.io/version: "v3.10.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of: brioit-local
    spec:
      securityContext:
        fsGroup: 65534 # nobody group for Prometheus
      initContainers:
        - name: create-database
          image: postgres:16.13
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: prometheus-db-secret
                  key: DB_POSTGRESDB_HOST
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: prometheus-db-secret
                  key: DB_POSTGRESDB_PORT
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: prometheus-db-secret
                  key: DB_POSTGRESDB_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: prometheus-db-secret
                  key: DB_POSTGRESDB_PASSWORD
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h $PGHOST -p $PGPORT -U $PGUSER; do
                echo "Waiting for database connection..."
                sleep 2
              done
              echo "PostgreSQL is ready!"

              echo "Creating database 'prometheus' if it doesn't exist..."
              psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'prometheus'" | grep -q 1 || psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -c "CREATE DATABASE prometheus"
              echo "Database setup complete!"
        - name: fix-permissions
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - |
              echo "Fixing permissions for Prometheus directories..."
              chown -R 65534:65534 /prometheus
              chmod -R 755 /prometheus
              echo "Permissions fixed!"
          volumeMounts:
            - name: prometheus-data
              mountPath: /prometheus
          securityContext:
            runAsUser: 0
      containers:
        - name: prometheus
          image: prom/prometheus:v3.10.0
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
          ports:
            - containerPort: 9090
              name: http
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
            - "--storage.tsdb.retention.size=15GB"
            - "--web.console.libraries=/etc/prometheus/console_libraries"
            - "--web.console.templates=/etc/prometheus/consoles"
            - "--web.enable-lifecycle"
            - "--web.external-url=https://prometheus.local.127.0.0.1.nip.io"
            - "--web.route-prefix=/"
          env:
            # Redis cache configuration (optional for metrics caching)
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: prometheus-db-secret
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: prometheus-db-secret
                  key: REDIS_PORT
            - name: REDIS_DB
              valueFrom:
                secretKeyRef:
                  name: prometheus-db-secret
                  key: REDIS_DB
          resources:
            requests:
              cpu: "150m"
              memory: "300Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: prometheus-data
              mountPath: /prometheus
            - name: prometheus-config
              mountPath: /etc/prometheus
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-pvc
        - name: prometheus-config
          configMap:
            name: prometheus-config
