apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app: n8n
    app.kubernetes.io/name: n8n
    app.kubernetes.io/part-of: pasb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
        app.kubernetes.io/name: n8n
        app.kubernetes.io/part-of: pasb
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: create-database
          image: postgres:16.13
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: DB_POSTGRESDB_HOST
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: DB_POSTGRESDB_PORT
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: DB_POSTGRESDB_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: DB_POSTGRESDB_PASSWORD
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h $PGHOST -p $PGPORT -U $PGUSER; do
                echo "Waiting for database connection..."
                sleep 2
              done
              echo "Creating database 'n8n' if not exists..."
              psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -tc \
                "SELECT 1 FROM pg_database WHERE datname = 'n8n'" | grep -q 1 || \
                psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -c "CREATE DATABASE n8n"
              echo "Database setup complete!"
        - name: fix-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              chown -R 1000:1000 /home/node/.n8n /files
              chmod 755 /home/node/.n8n /files
              [ -f /home/node/.n8n/config ] && chmod 600 /home/node/.n8n/config
              echo "Permissions fixed."
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
            - name: n8n-files
              mountPath: /files
          securityContext:
            runAsUser: 0
      containers:
        - name: n8n
          image: n8nio/n8n:2.13.4
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - containerPort: 5678
          env:
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: DB_POSTGRESDB_HOST
            - name: DB_POSTGRESDB_PORT
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: DB_POSTGRESDB_PORT
            - name: DB_POSTGRESDB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: DB_POSTGRESDB_DATABASE
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: DB_POSTGRESDB_USER
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: DB_POSTGRESDB_PASSWORD
            - name: N8N_HOST
              value: n8n.local.127.0.0.1.nip.io
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: https
            - name: WEBHOOK_URL
              value: https://n8n.local.127.0.0.1.nip.io
            - name: N8N_PROXY_SET_HEADERS
              value: "true"
            - name: N8N_RATE_LIMITING_DISABLED
              value: "true"
            - name: N8N_TRUST_PROXY
              value: "true"
            - name: EXPRESS_TRUST_PROXY
              value: "true"
            - name: N8N_SECURE_COOKIE
              value: "true"
            - name: N8N_SESSION_COOKIE_SECURE
              value: "true"
            - name: N8N_RUNNERS_ENABLED
              value: "true"
            - name: N8N_BLOCK_ENV_ACCESS_IN_NODE
              value: "false"
            - name: N8N_DEFAULT_BINARY_DATA_MODE
              value: "filesystem"
            - name: N8N_RESTRICT_FILE_ACCESS_TO
              value: "/files"
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: N8N_ENCRYPTION_KEY
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536 --max-http-header-size=16384"
            - name: N8N_METRICS
              value: "true"
            - name: N8N_CACHE_BACKEND
              value: "redis"
            - name: QUEUE_BULL_REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: QUEUE_BULL_REDIS_HOST
            - name: QUEUE_BULL_REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: QUEUE_BULL_REDIS_PORT
            - name: QUEUE_BULL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: QUEUE_BULL_REDIS_PASSWORD
            - name: QUEUE_BULL_REDIS_DB
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: QUEUE_BULL_REDIS_DB
            - name: DB_POSTGRESDB_POOL_SIZE
              value: "10"
            - name: DB_POSTGRESDB_CONNECTION_TIMEOUT
              value: "30000"
            - name: N8N_WORKER_INSTANCE_COUNT
              value: "2"
            - name: N8N_STARTUP_TIMEOUT
              value: "300"
            - name: GENERIC_TIMEZONE
              value: "America/Sao_Paulo"
            - name: N8N_DISABLE_TELEMETRY
              value: "true"
            - name: N8N_COMPRESSION_ENABLED
              value: "true"
          resources:
            requests:
              cpu: "300m"
              memory: "800Mi"
            limits:
              cpu: "1500m"
              memory: "2048Mi"
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
            - name: n8n-files
              mountPath: /files
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-pvc
        - name: n8n-files
          persistentVolumeClaim:
            claimName: n8n-data-pvc
