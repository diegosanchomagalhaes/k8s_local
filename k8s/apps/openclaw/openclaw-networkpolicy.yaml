# NetworkPolicy para o namespace openclaw
# Permite: ingress via Traefik; egresso externo para APIs de IA e canais de mensagens
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-network-policy
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: brioit-local
spec:
  podSelector:
    matchLabels:
      app: openclaw
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Permite tráfego do Traefik (kube-system) — Control UI + WebSocket
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 18789
          protocol: TCP
        - port: 18790
          protocol: TCP
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS externo (APIs de IA: OpenAI, Anthropic, etc. e canais: Telegram, Slack, etc.)
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
