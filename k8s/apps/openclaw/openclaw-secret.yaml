apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secret
  namespace: openclaw
  labels:
    app: openclaw
    component: config
type: Opaque
stringData:
  # Token de autenticação do Gateway OpenClaw (obrigatório)
  # Gere com: openssl rand -hex 32
  OPENCLAW_GATEWAY_TOKEN: YOUR_OPENCLAW_GATEWAY_TOKEN_HERE

  # Fuso horário (opcional, padrão UTC)
  OPENCLAW_TZ: America/Sao_Paulo

  # Segurança: permite WebSocket privado inseguro (deixe vazio em produção)
  OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ""

  # Claude AI (opcional — apenas se usar autenticação por sessão/cookie)
  CLAUDE_AI_SESSION_KEY: ""
  CLAUDE_WEB_SESSION_KEY: ""
  CLAUDE_WEB_COOKIE: ""

  # API Keys de provedores de IA (configure os que for usar)
  # OpenAI
  OPENAI_API_KEY: YOUR_OPENAI_API_KEY_HERE
  # Anthropic
  ANTHROPIC_API_KEY: YOUR_ANTHROPIC_API_KEY_HERE
  # Google Gemini (opcional)
  # GOOGLE_API_KEY: YOUR_GOOGLE_API_KEY_HERE
