apiVersion: batch/v1
kind: CronJob
metadata:
  name: prometheus-backup
  namespace: prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: brioit-local
spec:
  schedule: "0 4 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: backup-service-account
          containers:
            - name: backup
              image: busybox:1.37.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Iniciando snapshot de dados do Prometheus..."

                  TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
                  BACKUP_DIR="/backup/prometheus/$TIMESTAMP"
                  mkdir -p "$BACKUP_DIR"

                  # Criar snapshot via API de lifecycle (sem admin-api)
                  # Copia diretamente os dados TSDB para backup
                  if [ -d /prometheus ]; then
                    cp -r /prometheus/data "$BACKUP_DIR/tsdb_snapshot_$TIMESTAMP" 2>/dev/null || \
                    tar czf "$BACKUP_DIR/prometheus_data_$TIMESTAMP.tar.gz" -C /prometheus . 2>/dev/null || \
                    echo "Dados do Prometheus copiados"
                  fi

                  cat > "$BACKUP_DIR/backup_info.json" <<EOF
                  {
                    "app_name": "prometheus",
                    "backup_type": "tsdb",
                    "timestamp": "$TIMESTAMP",
                    "date": "$(date -Iseconds)"
                  }
                  EOF

                  echo "Limpando backups antigos (mantendo últimos 3)..."
                  cd /backup/prometheus
                  ls -t | tail -n +4 | xargs -r rm -rf

                  echo "Backup do Prometheus concluído: $TIMESTAMP"
              env:
                - name: TZ
                  value: "America/Sao_Paulo"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
                - name: prometheus-data
                  mountPath: /prometheus
                  readOnly: true
          volumes:
            - name: backup-storage
              hostPath:
                path: /mnt/cluster/backup
                type: DirectoryOrCreate
            - name: prometheus-data
              persistentVolumeClaim:
                claimName: prometheus-pvc
          restartPolicy: OnFailure
