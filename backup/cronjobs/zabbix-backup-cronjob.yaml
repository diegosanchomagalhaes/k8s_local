apiVersion: batch/v1
kind: CronJob
metadata:
  name: zabbix-backup
  namespace: zabbix
  labels:
    app.kubernetes.io/name: zabbix
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: brioit-local
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: backup-service-account
          containers:
            - name: backup
              image: postgres:16.13
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  echo "Iniciando backup do Zabbix..."

                  TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
                  BACKUP_DIR="/backup/zabbix/$TIMESTAMP"
                  mkdir -p "$BACKUP_DIR"

                  DB_PASSWORD=$(cat /etc/secrets/postgres-password)
                  export PGPASSWORD="$DB_PASSWORD"

                  pg_dump -h postgres.postgres.svc.cluster.local -p 5432 -U postgres -d zabbix \
                    --verbose --clean --no-owner --no-privileges \
                    > "$BACKUP_DIR/zabbix_database_$TIMESTAMP.sql"

                  gzip "$BACKUP_DIR/zabbix_database_$TIMESTAMP.sql"

                  cat > "$BACKUP_DIR/backup_info.json" <<EOF
                  {
                    "app_name": "zabbix",
                    "backup_type": "db",
                    "timestamp": "$TIMESTAMP",
                    "date": "$(date -Iseconds)"
                  }
                  EOF

                  echo "Limpando backups antigos (mantendo últimos 7)..."
                  cd /backup/zabbix
                  ls -t | tail -n +8 | xargs -r rm -rf

                  echo "Backup do Zabbix concluído: $TIMESTAMP"
              env:
                - name: TZ
                  value: "America/Sao_Paulo"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
                - name: postgres-secret
                  mountPath: /etc/secrets
                  readOnly: true
          volumes:
            - name: backup-storage
              hostPath:
                path: /mnt/cluster/backup
                type: DirectoryOrCreate
            - name: postgres-secret
              secret:
                secretName: postgres-admin-secret
                items:
                  - key: POSTGRES_PASSWORD
                    path: postgres-password
          restartPolicy: OnFailure
